name: Go

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build frontend (for embed)
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          cp -r web/dist internal/dashboard/dist

      - name: Verify Go build
        run: go build ./cmd/gatecha/

      - name: Run Go tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload Go coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx vue-tsc -b

      - name: Run tests with coverage
        run: cd web && npx vitest run --coverage

      - name: Build
        run: cd web && npm run build

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: web/coverage/lcov.info

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build frontend (for embed)
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          cp -r web/dist internal/dashboard/dist

      - name: Run go vet
        run: go vet ./...

  test-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gatecha_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build frontend (for embed)
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          cp -r web/dist internal/dashboard/dist

      - name: Run MySQL integration tests
        env:
          GATECHA_TEST_MYSQL_DSN: "root:root@tcp(localhost:3306)/gatecha_test?parseTime=true&charset=utf8mb4&loc=UTC"
        # -p 1: run packages sequentially — MySQL tests share one database,
        # concurrent packages would race on schema creation/deletion.
        run: go test -p 1 ./...

  sonarqube:
    runs-on: ubuntu-latest
    needs: [test, lint, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Go coverage report
        uses: actions/download-artifact@v4
        with:
          name: go-coverage

      - name: Download frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: web/coverage

      - name: Install frontend dependencies
        run: cd web && npm ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
